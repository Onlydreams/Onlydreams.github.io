name: Submit URLs to IndexNow

on:
  push:
    branches:
      - main
    paths:
      - "_posts/**"
      - "_includes/**"
      - "_layouts/**"
      - "_data/**"
      - "assets/**"
      - "_config.yml"
      - ".github/scripts/indexnow.rb"
      - "index.html"
      - "about.md"
      - "categories.md"
      - "series.md"
      - "status.md"
      - "tags.md"
      - "search.md"
      - "search.json"
      - "bin/**"
      - "test/**"
      - "robots.txt"
      - "CNAME"
      - "34366ad016cd48238ee20158d2a43852.txt"
      - ".github/workflows/indexnow.yml"
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build local sitemap
        run: bundle exec jekyll build

      - name: Wait for sitemap deployment
        id: wait_for_sitemap
        continue-on-error: true
        env:
          EXPECTED_SITEMAP_PATH: _site/sitemap.xml
          INDEXNOW_HOST: www.dayjia.com
          INDEXNOW_KEY: 34366ad016cd48238ee20158d2a43852
          KEY_URL: https://www.dayjia.com/34366ad016cd48238ee20158d2a43852.txt
          SITEMAP_URL: https://www.dayjia.com/sitemap.xml
        run: ruby .github/scripts/indexnow.rb wait

      - name: Submit sitemap URLs
        if: steps.wait_for_sitemap.outcome == 'success'
        env:
          INDEXNOW_ENDPOINT: https://api.indexnow.org/indexnow
          INDEXNOW_HOST: www.dayjia.com
          INDEXNOW_KEY: 34366ad016cd48238ee20158d2a43852
          INDEXNOW_KEY_LOCATION: https://www.dayjia.com/34366ad016cd48238ee20158d2a43852.txt
          SITEMAP_URL: https://www.dayjia.com/sitemap.xml
        run: ruby .github/scripts/indexnow.rb submit
