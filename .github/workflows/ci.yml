name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      - name: Run site feature tests
        run: bundle exec ruby test/site_features_test.rb

      - name: Run content health tests
        run: bundle exec ruby test/content_health_test.rb
