name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Check portable shell syntax
        if: runner.os != 'Windows'
        run: |
          bash -n bin/preflight
          bash -n bin/setup
          bash -n bin/test
          bash -n bin/serve

      - name: Run full site tests on Unix
        if: runner.os != 'Windows'
        run: bash bin/test

      - name: Run full site tests on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\bin\test.ps1
