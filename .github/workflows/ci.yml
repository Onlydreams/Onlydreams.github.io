name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Check portable shell syntax
        run: bash -n bin/preflight bin/setup bin/test bin/serve

      - name: Run full site tests
        run: bash bin/test
