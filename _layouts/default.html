<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body data-page="{{ page.layout }}">

    <a class="skip-link" href="#main-content">跳到主要内容</a>

    {%- include header.html -%}

    <main id="main-content" class="page-content" aria-label="Content" tabindex="-1">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/page-enhancements.js' | relative_url }}" defer></script>
    {%- if page.layout == "post" -%}
    <script src="{{ '/assets/js/code-copy.js' | relative_url }}" defer></script>
    {%- endif -%}
    {%- if page.search -%}
    <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
    {%- endif -%}
  </body>

</html>
