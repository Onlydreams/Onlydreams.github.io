<!-- Prevent FOUC: apply theme before first paint -->
<script>
  (function () {
    try {
      var stored = localStorage.getItem("blog-theme");
      var theme =
        stored ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light");
      document.documentElement.setAttribute("data-theme", theme);
    } catch (e) {}
  })();
</script>
